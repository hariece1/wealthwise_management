spring.application.name=wealthwise

# ===== Server =====
# Port 8080 is occupied on this machine, so WealthWise runs on 8081
server.port=8098

# ===== MySQL Datasource =====
# Dedicated EMPTY schema. The other wealthwise* databases on this server belong
# to previous projects and already contain a "users" table with a different
# structure (PK "id", extra columns) that collides with this project's entities.
# wealthwise_demo was created empty so Hibernate builds all tables correctly.
spring.datasource.url=jdbc:mysql://localhost:3306/wealthwise_banking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Logging =====
logging.level.org.springframework.security=INFO
